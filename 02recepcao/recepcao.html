<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Recepção - CER III</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="style-recepcao.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <div class="nav-logo"><span class="material-symbols-outlined">clinical_notes</span></div>
            <div class="nav-title">
                <h1>Painel da Recepção</h1>
                <p>CER III - GERENCIAMENTO DE FILA</p>
            </div>
        </div>
    </header>

    <main class="content-container">

        <section class="section-group">
            <div class="main-card">
                <div class="main-card-info">
                    <div class="ticket-box" id="current-ticket">--</div>
                    <div class="patient-info">
                        <h3 id="current-name">---</h3>
                        <div class="meta-row">
                            <span class="material-symbols-outlined">medical_services</span>
                            <p id="current-meta">---</p>
                        </div>
                    </div>
                </div>

                <div style="display:flex; gap:15px;">
                    <button class="btn-next-main" id="btn-next">
                        PRÓXIMO <span class="material-symbols-outlined">arrow_forward</span>
                    </button>

                    <button class="btn-next-main" id="btn-repeat" style="background:#059669;">
                        <span class="material-symbols-outlined">volume_up</span>
                        REPETIR
                    </button>
                </div>
            </div>
        </section>

        <section class="section-group">
            <div class="main-card generator-card">
                <input id="input-nome" class="generator-input" placeholder="Digite o nome (opcional)">
                <button id="btn-gerar" class="btn-generate">
                    + GERAR PACIENTE
                </button>
            </div>
        </section>

        <section class="section-group">
            <div class="list-wrapper" id="queue-container"></div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="script-recepcao.js"></script>
</body>
</html>
